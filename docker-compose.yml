services:
  postgres:
    image: postgres:15-alpine
    container_name: localcart-postgres
    environment:
      POSTGRES_DB: ${LC_POSTGRES_DB:-localcart}
      POSTGRES_USER: ${LC_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${LC_POSTGRES_PASSWORD:-root}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LC_POSTGRES_USER:-postgres} -d ${LC_POSTGRES_DB:-localcart}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - localcart-network

  redis:
    image: redis:7-alpine
    container_name: localcart-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - localcart-network

  adminer:
    image: adminer:latest
    container_name: localcart-adminer
    ports:
      - "8081:8080"
    depends_on:
      - postgres
    networks:
      - localcart-network

  n8n:
    image: n8nio/n8n:latest
    container_name: localcart-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=changeme123
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=${LC_POSTGRES_USER:-postgres}
      - DB_POSTGRESDB_PASSWORD=${LC_POSTGRES_PASSWORD:-root}
      - GENERIC_TIMEZONE=UTC
      - TZ=UTC
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - localcart-network

  # Backend (Spring Boot)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: localcart-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${LC_POSTGRES_DB:-localcart}
      - DB_USER=${LC_POSTGRES_USER:-postgres}
      - DB_PASSWORD=${LC_POSTGRES_PASSWORD:-root}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-dev-secret-key-change-in-production-with-32-byte-base64}
      - N8N_WEBHOOK_URL=http://n8n:5678/webhook
      - N8N_WEBHOOK_ENABLED=true
      - AUTOMATION_ENABLED=true
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-1025}
      - APP_PASSWORD_RESET_URL=${APP_PASSWORD_RESET_URL:-http://localhost:3000/reset?token=}
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - localcart-network
    restart: unless-stopped

  # Monitoring Stack
  prometheus:
    image: prom/prometheus:latest
    container_name: localcart-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - localcart-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: localcart-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - localcart-network
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: localcart-loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - localcart-network
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: localcart-promtail
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml
      - ./logs:/var/log/localcart
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - localcart-network
    restart: unless-stopped

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: localcart-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api/v1
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - localcart-network
    restart: unless-stopped

volumes:
  postgres_data:
  n8n_data:
  prometheus_data:
  grafana_data:
  loki_data:
networks:
  localcart-network:
    driver: bridge